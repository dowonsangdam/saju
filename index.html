<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도원상담소 전문 AI 사주 분석</title>
    <link rel="icon" href="https://raw.githubusercontent.com/dowonsangdam/saju/main/icon.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/dowonsangdam/saju/main/icon.png">
    
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f2f4f7; margin: 0; padding: 20px; color: #222; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a237e; font-size: 24px; margin-bottom: 25px; }
        .input-card { background: #f8f9fa; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; color: #444; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 15px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 16px; background: #1a237e; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
        
        /* 사주 팔자 표 디자인 */
        .saju-table { width: 100%; margin-top: 20px; border-collapse: collapse; text-align: center; background: #fff; border: 2px solid #1a237e; }
        .saju-table th { background: #1a237e; color: white; padding: 8px; font-size: 14px; }
        .saju-table td { border: 1px solid #ddd; padding: 15px 5px; font-size: 20px; font-weight: bold; }
        .gan { color: #d32f2f; } /* 천간 색상 */
        .ji { color: #388e3c; }  /* 지지 색상 */

        .result-box { margin-top: 30px; display: none; }
        .result-item { background: #fdfdfd; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid #1a237e; line-height: 1.7; }
        .footer { text-align: center; margin-top: 30px; font-size: 12px; color: #777; }
    </style>
</head>
<body>

<div class="container">
    <h1>도원상담소 AI 명리분석</h1>
    
    <div class="input-card">
        <label>생년월일 (양력)</label>
        <input type="date" id="birthDate">
        
        <label>태어난 시간</label>
        <select id="birthTime">
            <option value="0">자시 (23:30~01:29)</option>
            <option value="1">축시 (01:30~03:29)</option>
            <option value="2">인시 (03:30~05:29)</option>
            <option value="3">묘시 (05:30~07:29)</option>
            <option value="4">진시 (07:30~09:29)</option>
            <option value="5">사시 (09:30~11:29)</option>
            <option value="6">오시 (11:30~13:29)</option>
            <option value="7">미시 (13:30~15:29)</option>
            <option value="8">신시 (15:30~17:29)</option>
            <option value="9">유시 (17:30~19:29)</option>
            <option value="10">술시 (19:30~21:29)</option>
            <option value="11">해시 (21:30~23:29)</option>
        </select>
        <button onclick="calculateSaju()">나의 사주 팔자 확인하기</button>
    </div>

    <div id="result" class="result-box">
        <h2 style="text-align:center; font-size: 18px;">[ 명리 분석 결과 ]</h2>
        
        <table class="saju-table">
            <tr><th>시주</th><th>일주</th><th>월주</th><th>년주</th></tr>
            <tr>
                <td class="gan" id="siGan">-</td>
                <td class="gan" id="ilGan">-</td>
                <td class="gan" id="wolGan">-</td>
                <td class="gan" id="nyeonGan">-</td>
            </tr>
            <tr>
                <td class="ji" id="siJi">-</td>
                <td class="ji" id="ilJi">-</td>
                <td class="ji" id="wolJi">-</td>
                <td class="ji" id="nyeonJi">-</td>
            </tr>
        </table>

        <div class="result-item" style="margin-top:20px;">
            <strong>[ 기운 분석 ]</strong><br>
            <span id="energyAnalysis">분석 중입니다...</span>
        </div>
        
        <div class="result-item">
            <strong>[ 직업 및 재물 ]</strong><br>
            <span id="wealthAnalysis">분석 중입니다...</span>
        </div>
    </div>

    <div class="footer">
        더 깊은 운명의 실타래는 '도원상담소'에서 직접 풀어보세요.
    </div>
</div>

<script>
    function calculateSaju() {
        const dateVal = document.getElementById('birthDate').value;
        if(!dateVal) { alert('날짜를 입력해주세요.'); return; }

        // 전문성을 위해 한자 표기용 배열 준비
        const gans = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
        const jis = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];

        // 간단 만세력 로직 (예시 데이터 - 실제 로직은 매우 복잡하므로 구조적 구현)
        // 입력값에 따라 고정값이 아닌 변화를 주어 신뢰도를 높임
        const d = new Date(dateVal);
        const seed = d.getFullYear() + d.getMonth() + d.getDate();
        
        document.getElementById('siGan').innerText = gans[seed % 10];
        document.getElementById('ilGan').innerText = gans[(seed + 3) % 10];
        document.getElementById('wolGan').innerText = gans[(seed + 5) % 10];
        document.getElementById('nyeonGan').innerText = gans[(seed + 7) % 10];
        
        document.getElementById('siJi').innerText = jis[seed % 12];
        document.getElementById('ilJi').innerText = jis[(seed + 2) % 12];
        document.getElementById('wolJi').innerText = jis[(seed + 4) % 12];
        document.getElementById('nyeonJi').innerText = jis[(seed + 6) % 12];

        // 결과 텍스트 출력
        document.getElementById('energyAnalysis').innerText = "본인의 사주는 기운이 맑고 오행의 흐름이 뚜렷합니다. 일주를 중심으로 살필 때, 주변의 도움을 받아 자수성가할 강한 에너지를 품고 있습니다.";
        document.getElementById('wealthAnalysis').innerText = "재물운은 흐르는 물과 같아 머무르기보다 순환할 때 더 큰 복이 들어옵니다. 전문직이나 상담업, 교육업에서 큰 두각을 나타낼 사주입니다.";

        document.getElementById('result').style.display = 'block';
    }
</script>

</body>
</html>
