<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도원상담소 AI 사주 리포트</title>
    <link rel="icon" href="https://raw.githubusercontent.com/dowonsangdam/saju/main/icon.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/dowonsangdam/saju/main/icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px 20px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a237e; font-size: 26px; margin-bottom: 30px; letter-spacing: -1px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; font-weight: 600; font-size: 15px; color: #555; }
        input, select { width: 100%; padding: 14px; border: 1px solid #e0e0e0; border-radius: 12px; box-sizing: border-box; font-size: 16px; transition: border 0.3s; }
        input:focus { border-color: #1a237e; outline: none; }
        button { width: 100%; padding: 16px; background: #1a237e; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 10px rgba(26, 35, 126, 0.2); }
        .result-box { margin-top: 35px; display: none; }
        .result-title { font-size: 20px; font-weight: bold; color: #1a237e; margin-bottom: 20px; text-align: center; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        .result-item { background: #fdfdfd; padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid #f0f0f0; line-height: 1.8; }
        .result-item h3 { margin-top: 0; color: #3949ab; font-size: 17px; margin-bottom: 10px; }
        .footer { text-align: center; margin-top: 40px; font-size: 13px; color: #999; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h1>도원상담소 AI 사주 리포트</h1>
    
    <div class="input-group">
        <label>생년월일</label>
        <input type="date" id="birthDate">
    </div>
    
    <div class="input-group">
        <label>태어난 시간 (선택)</label>
        <select id="birthTime">
            <option value="unknown">모름/정확하지 않음</option>
            <option value="0">자시 (23:30~01:29)</option>
            <option value="1">축시 (01:30~03:29)</option>
            <option value="2">인시 (03:30~05:29)</option>
            <option value="3">묘시 (05:30~07:29)</option>
            <option value="4">진시 (07:30~09:29)</option>
            <option value="5">사시 (09:30~11:29)</option>
            <option value="6">오시 (11:30~13:29)</option>
            <option value="7">미시 (13:30~15:29)</option>
            <option value="8">신시 (15:30~17:29)</option>
            <option value="9">유시 (17:30~19:29)</option>
            <option value="10">술시 (19:30~21:29)</option>
            <option value="11">해시 (21:30~23:29)</option>
        </select>
    </div>

    <button onclick="analyzeSaju()">분석 결과 보기</button>

    <div id="result" class="result-box">
        <div class="result-title">사주 분석 결과</div>
        
        <div class="result-item">
            <h3>👤 타고난 성격과 기운</h3>
            <p id="characterResult"></p>
        </div>
        
        <div class="result-item">
            <h3>💰 재물 및 직업운</h3>
            <p id="jobResult"></p>
        </div>

        <div class="result-item">
            <h3>🍀 2026년 흐름</h3>
            <p id="yearResult">올해는 새로운 변화의 기운이 강하게 들어오는 시기입니다. 차분하게 계획했던 일을 추진하면 하반기에 좋은 결실을 맺을 수 있는 운세입니다.</p>
        </div>
    </div>

    <div class="footer">
        본 리포트는 AI 분석 결과이므로 참고용으로 활용하시기 바랍니다.<br>
        <strong>더 상세한 상담은 '도원상담소(천진암)' 블로그를 방문해주세요.</strong>
    </div>
</div>

<script>
    function analyzeSaju() {
        const birthDate = document.getElementById('birthDate').value;
        if (!birthDate) {
            alert('생년월일을 입력해주세요.');
            return;
        }

        // 여기에 추후 만세력 계산 로직이 정밀하게 들어갈 예정입니다.
        // 현재는 입력된 값을 바탕으로 결과를 보여주는 구조를 완성합니다.

        document.getElementById('characterResult').innerText = "온화하면서도 내면의 강단이 있는 성품입니다. 예술적 감수성이 풍부하며, 타인의 마음을 읽는 통찰력이 뛰어납니다. 주변 사람들에게 신뢰를 주는 듬직한 기운을 가지고 계시네요.";
        
        document.getElementById('jobResult').innerText = "전문적인 기술이나 지식을 활용하는 분야에서 성공할 가능성이 높습니다. 재물운은 성실함을 바탕으로 서서히 쌓여가는 흐름이며, 중년 이후 안정적인 경제력을 갖추게 될 운세입니다.";

        document.getElementById('result').style.display = 'block';
        
        // 결과 화면으로 부드럽게 스크롤 이동
        window.scrollTo({
            top: document.getElementById('result').offsetTop,
            behavior: 'smooth'
        });
    }
</script>

</body>
</html>
