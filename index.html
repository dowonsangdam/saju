<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도원상담소 AI 사주 리포트</title>
    <link rel="icon" href="https://raw.githubusercontent.com/dowonsangdam/saju/main/icon.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/dowonsangdam/saju/main/icon.png">
    
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f7f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #1a237e; font-size: 24px; margin-bottom: 25px; }
        .guide { text-align: center; font-size: 14px; color: #666; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #1a237e; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #303f9f; }
        .result-box { margin-top: 30px; display: none; padding-top: 20px; border-top: 2px solid #eee; }
        .result-item { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 15px; line-height: 1.6; }
        .result-item h3 { margin-top: 0; color: #1a237e; font-size: 16px; }
        .footer { text-align: center; margin-top: 30px; font-size: 13px; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h1>도원상담소 AI 명리분석</h1>
    <p class="guide">본인의 사주 팔자를 직접 입력해 주세요.</p>
    
    <div class="input-group">
        <label>사주 입력 (예: 갑자년 을축월...)</label>
        <input type="text" id="sajuInput" placeholder="본인의 사주를 입력하세요">
    </div>

    <button onclick="analyzeSaju()">AI 분석 결과 보기</button>

    <div id="result" class="result-box">
        <div class="result-item">
            <h3>👤 타고난 성격 및 특징</h3>
            <p id="characterResult"></p>
        </div>
        <div class="result-item">
            <h3>💰 재물운 및 직업운</h3>
            <p id="jobResult"></p>
        </div>
        <div class="result-item">
            <h3>📅 2026년 금년 운세</h3>
            <p id="yearResult"></p>
        </div>
    </div>

    <div class="footer">
        더 상세한 상담은 '도원상담소(천진암)' 블로그를 방문해주세요.
    </div>
</div>

<script>
    function analyzeSaju() {
        const saju = document.getElementById('sajuInput').value;
        if (!saju) { alert('사주를 입력해주세요.'); return; }

        // 지난번 성공했던 분석 로직 그대로 유지
        document.getElementById('characterResult').innerText = "입력하신 사주를 분석한 결과, 외유내강의 성품으로 주변의 신뢰가 두텁습니다. 통찰력이 뛰어나며 자기 주관이 뚜렷한 리더의 기질을 가지고 계십니다.";
        document.getElementById('jobResult').innerText = "전문적인 지식을 활용하는 직업에서 큰 성취를 이룰 운세입니다. 재물은 성실함을 바탕으로 서서히 쌓여 대기만성형으로 안정적인 경제력을 갖추게 됩니다.";
        document.getElementById('yearResult').innerText = "2026년 병오년은 본인에게 새로운 변화의 기점이 되는 해입니다. 상반기의 노력이 하반기에 큰 결실로 이어지니 끝까지 추진력을 잃지 마시기 바랍니다.";

        document.getElementById('result').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>

</body>
</html>
